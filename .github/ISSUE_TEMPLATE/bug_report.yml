name: Bug Report
description: Report an Issue or Bug with the Laravel Location
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        We're sorry to hear you have a problem. Can you help us solve it by providing the following details.
  - type: textarea
    id: what-happened
    attributes:
      label: What Happened
      description: What did you expect to happen?
      placeholder: When I try to store a country or attach an address to a model, I get an incorrect result
    validations:
      required: true
  - type: textarea
    id: how-to-reproduce
    attributes:
      label: How to Reproduce
      description: How did this occur, please add any command or code used and provide a set of reliable steps if possible.
      placeholder: |
        Using Location service:
        use JobMetric\Location\Facades\Country;
        
        $response = Country::store([
            'name' => 'Iran',
            'flag' => 'iran.svg',
            'mobile_prefix' => 98,
            'status' => true,
        ]);
        
        Or using HasAddress trait:
        use JobMetric\Location\HasAddress;
        
        class User extends Model
        {
            use HasAddress;
        }
        
        $user->address()->store([...]);
    validations:
      required: true
  - type: input
    id: expected-output
    attributes:
      label: Expected Output
      description: What output did you expect to receive?
      placeholder: "Country should be stored successfully or address should be attached to the model"
    validations:
      required: true
  - type: input
    id: actual-output
    attributes:
      label: Actual Output
      description: What output did you actually receive?
      placeholder: "Store operation fails or throws an exception"
    validations:
      required: true
  - type: input
    id: package-version
    attributes:
      label: Package Version
      description: What version of Laravel Location are you running? Please be as specific as possible
      placeholder: 1.0.0
    validations:
      required: true

